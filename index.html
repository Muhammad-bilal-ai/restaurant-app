<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/ec525d2683.js"
      crossorigin="anonymous"
    ></script>
    <!-- Cormorant Garamond: elegant serif for restaurant feel -->
    <!-- Jost: clean modern sans for body text -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <title>restaurant app</title>
  </head>
  <body class="body">
    <!--== header ==-->
    <header>
      <div class="overlay"></div>
      <!-- 1st nav logo + phone-->
      <div class="nav top-nav">
        <div class="logo">
          <i class="fa-solid fa-utensils"></i><span>Restaurant</span>
        </div>
        <div>
          <a href="tel:0800100030" class="phone-link">
            <i class="fa-solid fa-phone"></i>
            Call us 0800 100 030
          </a>
        </div>
      </div>
      <!-- 2nd nav -->
      <nav class="nav second-nav">
        <a href="#" class="nav-link active">Home</a>
        <a href="#" class="nav-link">About Us</a>
        <a href="#" class="nav-link">Menu</a>
        <a href="#" class="nav-link">Contact Us</a>
        <a href="#" class="nav-link highlight">Book a Table</a>
      </nav>

      <!-- == content == -->
      <div class="hero-content">
        <h1 class="hero-heading">
          Try Something<br />
          <em>New Today</em>
        </h1>
        <p class="hero-description">
          Fresh ingredients, bold flavors, unforgettable experience.
        </p>
        <!-- <a class="white-link" href="#">Book a Table</a>
        <a class="teal-link" href="#">View our Menu</a> -->
        <div class="hero-actions">
          <a href="#" class="btn btn-primary">Book a Table</a>
          <a href="#" class="btn btn-outline">View our Menu</a>
        </div>
      </div>
    </header>
  </body>
</html>
